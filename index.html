<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Evaluación: Ingeniería de lo Cotidiano</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #e0f7fa 0%, #fff0e6 50%, #f3e5f5 100%);
            font-family: 'Segoe UI', 'Roboto', 'Poppins', system-ui, sans-serif;
            padding: 1rem;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .quiz-wrapper {
            max-width: 780px;
            width: 100%;
            margin: 0 auto;
            background: #ffffffdd;
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2);
            padding: 1.5rem;
            transition: all 0.2s;
        }

        .header {
            text-align: center;
            margin-bottom: 1.2rem;
            border-bottom: 4px solid #ff8c42;
            padding-bottom: 0.7rem;
        }

        .header h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #1e6f9f, #e67e22);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.2px;
        }

        .sub {
            color: #e67e22;
            font-size: 0.85rem;
            margin-top: 0.2rem;
            font-weight: 600;
        }

        .progress-area {
            background: #e6e0f0;
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: #1a4a6e;
            font-weight: 700;
        }

        .question-counter {
            font-weight: 800;
            background: #ffcc88;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            color: #5a3a1a;
        }

        .score-badge {
            background: #88ccaa;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            font-weight: 700;
            color: #1a4a2e;
        }

        .question-card {
            background: #ffffff;
            border-radius: 1.5rem;
            padding: 1.3rem;
            margin-bottom: 1.2rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            border-left: 8px solid #ff8c42;
            border-right: 1px solid #f0e0d0;
        }

        .question-text {
            font-size: 1.08rem;
            font-weight: 800;
            color: #2c3e66;
            margin-bottom: 1.2rem;
            line-height: 1.4;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-bottom: 1rem;
        }

        .option {
            display: flex;
            align-items: flex-start;
            gap: 0.8rem;
            cursor: pointer;
            padding: 0.6rem 0.8rem;
            border-radius: 1rem;
            background: #fefaf5;
            border: 2px solid #e0d0c0;
            transition: all 0.15s;
        }

        .option:hover {
            background: #fff4e6;
            border-color: #ffaa66;
            transform: scale(1.01);
        }

        input[type="radio"] {
            appearance: none;
            -webkit-appearance: none;
            width: 1.2rem;
            height: 1.2rem;
            border: 2px solid #e67e22;
            border-radius: 50%;
            margin-top: 0.1rem;
            cursor: pointer;
            background: white;
            flex-shrink: 0;
        }

        input[type="radio"]:checked {
            background-color: #e67e22;
            border-color: #e67e22;
            box-shadow: inset 0 0 0 3px white;
        }

        .option label {
            flex: 1;
            font-size: 0.95rem;
            line-height: 1.4;
            cursor: pointer;
            color: #2c3e66;
            font-weight: 600;
        }

        .feedback {
            margin-top: 0.8rem;
            padding: 0.7rem 1rem;
            border-radius: 1rem;
            font-size: 0.85rem;
            background: #fef7e8;
            border-left: 5px solid;
            line-height: 1.4;
            color: #2c3e50;
        }

        .feedback.correct {
            border-left-color: #44aa66;
            background: #e0ffe8;
        }

        .feedback.incorrect {
            border-left-color: #ff6666;
            background: #ffe6e6;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            margin-top: 1rem;
        }

        .btn {
            border: none;
            background: #ddd0c0;
            color: #4a3a2a;
            font-weight: 800;
            padding: 0.6rem 1.3rem;
            border-radius: 60px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .btn-primary {
            background: #3a86ff;
            color: white;
        }

        .btn-primary:hover {
            background: #2a6ad0;
            transform: scale(1.02);
        }

        .btn-secondary {
            background: #e67e22;
            color: white;
        }

        .btn-secondary:hover {
            background: #d46a10;
        }

        .btn-reset {
            background: #cc6644;
            color: white;
        }

        .btn-reset:hover {
            background: #aa4422;
        }

        .btn-success {
            background: #44aa66;
            color: white;
        }

        .btn-success:hover {
            background: #338855;
        }

        .results-area {
            margin-top: 1.5rem;
            background: #fff2e0;
            border-radius: 1.2rem;
            padding: 1rem;
            border: 2px solid #ffaa33;
            display: none;
        }

        .results-area h3 {
            color: #cc5500;
            margin-bottom: 0.5rem;
        }

        .result-summary {
            font-size: 1rem;
            margin-bottom: 1rem;
            text-align: center;
            font-weight: bold;
            color: #1f4a2e;
        }

        .result-detail {
            max-height: 260px;
            overflow-y: auto;
            font-size: 0.8rem;
        }

        .result-item {
            padding: 0.4rem;
            border-bottom: 1px solid #ffd9a0;
            display: flex;
            gap: 0.5rem;
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 1.2rem;
            color: #aa8855;
        }

        @media (max-width: 550px) {
            .quiz-wrapper {
                padding: 1rem;
            }
            .question-text {
                font-size: 0.98rem;
            }
            .option label {
                font-size: 0.88rem;
            }
            .btn {
                padding: 0.5rem 1rem;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
<div class="quiz-wrapper">
    <div class="header">
        <h1>🔧 Ingeniería de lo Cotidiano</h1>
        <div class="sub">Mecanismos, circuitos, palancas, electricidad y transformación</div>
    </div>

    <div class="progress-area">
        <span class="question-counter" id="questionCounter">Pregunta 1 / 20</span>
        <span class="score-badge" id="liveScore">✅ Aciertos: 0</span>
    </div>

    <div id="questionContainer"></div>

    <div class="nav-buttons">
        <button id="prevBtn" class="btn btn-secondary">◀ Anterior</button>
        <button id="nextBtn" class="btn btn-primary">Siguiente ▶</button>
        <button id="resetBtn" class="btn btn-reset">⟳ Reiniciar</button>
        <button id="finalScoreBtn" class="btn btn-success">📊 Ver total</button>
    </div>

    <div id="resultsPanel" class="results-area"></div>
    <footer>📌 Selecciona una opción → retroalimentación inmediata. Al finalizar, revisa tu puntuación.</footer>
</div>

<script>
    // ==================== DATOS DEL CUESTIONARIO (20 preguntas) ====================
    // Respuestas correctas según las justificaciones proporcionadas
    const questionsData = [
        { text: "En el mecanismo del sacacorchos de doble palanca (Material), si el 'Force Multiplication Ratio' es de 4:1, ¿cuál es la implicación directa en el diagnóstico de una falla donde el corcho no cede a pesar de bajar las palancas completamente?",
          options: ["El torque de salida rotacional es insuficiente debido a un fallo en el worm gear drive.", "La fuerza de fricción del corcho excede cuatro veces la fuerza aplicada manualmente en las palancas primarias.", "El mecanismo de palanca primaria ha perdido su punto de apoyo, anulando la ventaja mecánica.", "El paso de la hélice es demasiado corto para transformar el movimiento circular en lineal."],
          correct: "b",
          explanation: "Correcta (b): El ratio 4:1 indica que la fuerza aplicada se multiplica por cuatro; si no se mueve, es porque la resistencia opuesta es superior a esa multiplicación de fuerza."
        },
        { text: "Según la 'Regla Cero' (Material), si un circuito presenta un 'camino roto' justo después del receptor (en el retorno a la fuente), ¿cuál es el comportamiento técnico esperado del flujo de electrones?",
          options: ["Los electrones se acumulan en el receptor, provocando un sobrecalentamiento por resistencia.", "El flujo continúa hasta el punto de ruptura, donde se disipa en forma de energía estática.", "La 'carrera' termina instantáneamente en todo el sistema, deteniendo el flujo desde la fuente.", "El receptor funciona a media capacidad al no poder completar el ciclo de retorno."],
          correct: "c",
          explanation: "Correcta (c): La fuente establece que la corriente debe regresar a la fuente y, si el camino se rompe, la carrera termina instantáneamente."
        },
        { text: "Al analizar la 'Analogía del Agua' (Material), ¿qué componente del sistema de fontanería representa la diferencia de potencial (voltaje) necesaria para vencer la resistencia del receptor?",
          options: ["El diámetro de la manguera (el cable).", "La capacidad de giro del molinete (la lamparita).", "La presión generada por la bomba de agua (la pila).", "El volumen total de agua en el circuito de retorno."],
          correct: "c",
          explanation: "Correcta (c): La bomba empuja la corriente, equivalente a la fuerza electromotriz o voltaje."
        },
        { text: "En un diseño de 'Circuito Conmutado' para un pasillo (Material), ¿cuál es la función técnica de los cables denominados 'Viajero 1' y 'Viajero 2'?",
          options: ["Actuar como limitadores de corriente para evitar sobrecargas en los interruptores.", "Proporcionar rutas paralelas alternativas que permitan cerrar el bucle independientemente de la posición del otro interruptor.", "Servir como líneas de tierra para estabilizar el flujo de electrones entre los dos puntos de control.", "Duplicar el voltaje para asegurar que el receptor reciba la energía necesaria a larga distancia."],
          correct: "b",
          explanation: "Correcta (b): El circuito conmutado desvía la corriente entre dos carriles paralelos (viajeros), permitiendo que cualquier interruptor cambie el estado del flujo."
        },
        { text: "Si en una instalación eléctrica doméstica (Circuito en Paralelo, Material) un receptor entra en cortocircuito y quema su línea de conexión, ¿por qué los demás receptores siguen funcionando?",
          options: ["Porque el sistema aumenta automáticamente el flujo en los 'carriles' restantes.", "Debido a la 'Resiliencia' inherente de tener caminos independientes directos a la fuente.", "Porque la falla catastrófica solo ocurre si los receptores están en la misma 'fila'.", "El generador compensa la pérdida de la ruta alternativa manteniendo la tensión constante."],
          correct: "b",
          explanation: "Correcta (b): En paralelo, cada receptor tiene su propio carril directo a la fuente, otorgando resiliencia ante fallas individuales."
        },
        { text: "El sacacorchos manual simple (Material) se describe como una 'hélice en acción'. Desde el punto de vista cinemático, ¿cuál es su transformación fundamental?",
          options: ["Transformación de torque radial en fuerza centrífuga.", "Conversión de un movimiento de rotación en un desplazamiento traslacional (lineal).", "Multiplicación de la velocidad angular en detrimento de la fuerza lineal.", "Redirección de la fuerza gravitacional en presión de rosca."],
          correct: "b",
          explanation: "Correcta (b): El material especifica que 'transforma el movimiento de giro en movimiento de rosca'."
        },
        { text: "En el diagnóstico de un circuito en serie de luces (Material), si todas las luces se apagan simultáneamente, ¿cuál es la deducción técnica más probable según el modelo de 'vagonetas de tren'?",
          options: ["La fuente ha agotado su capacidad de empuje por exceso de receptores.", "Se ha producido una falla en un solo punto, lo que interrumpió el único camino disponible.", "El último receptor de la fila ha bloqueado el retorno de electrones al generador.", "La resistencia total del sistema ha bajado de forma crítica."],
          correct: "b",
          explanation: "Correcta (b): El circuito en serie tiene tolerancia a fallos nula (falla catastrófica) porque todos están en la misma fila; si uno falla, el camino se corta para todos."
        },
        { text: "Comparando la pinza de depilar y el sacacorchos de doble palanca, ¿cuál es la diferencia técnica en su propósito de diseño según las fuentes?",
          options: ["La pinza busca la transformación de energía, mientras que el sacacorchos busca el almacenamiento.", "La pinza es una 'multiplicación de precisión', mientras que el sacacorchos es una multiplicación de fuerza.", "Ambos son mecanismos de palanca simple, pero el sacacorchos utiliza energía eléctrica.", "La pinza redirige electrones y el sacacorchos redirige fuerza física."],
          correct: "b",
          explanation: "Correcta (b): El material define la pinza como 'multiplicación de precisión' y el sacacorchos de doble palanca destaca su 'multiplicación de fuerza'."
        },
        { text: "Según la arquitectura de 'Todo es un Sistema de Transformación' (Material), ¿qué define realmente a la 'arquitectura oculta' debajo de un simple interruptor?",
          options: ["Su capacidad para crear energía a partir del movimiento mecánico.", "El propósito único de transformar, redirigir y aprovechar la energía.", "La simplificación estética para ocultar la complejidad del flujo de electrones.", "La integración de sistemas mecánicos y eléctricos en un solo componente sólido."],
          correct: "b",
          explanation: "Correcta (b): La fuente indica que debajo de cada superficie lisa existe esta arquitectura diseñada con ese triple propósito específico."
        },
        { text: "En el símbolo técnico de un 'Receptor' (Material), ¿qué diferencia fundamental existe entre un círculo con una 'X' y uno con una 'M'?",
          options: ["La 'X' indica un componente que consume energía y la 'M' uno que la genera.", "El primero representa energía lumínica (luz) y el segundo energía mecánica (motor).", "La 'M' es para circuitos de corriente alterna y la 'X' para corriente continua.", "Ambos son intercambiables, pero la 'M' indica una mayor resistencia eléctrica."],
          correct: "b",
          explanation: "Correcta (b): El manual de herramientas identifica el círculo con X como Luz y el círculo con M como Motor."
        },
        { text: "En la analogía de la 'Pista de Carreras' (Material), ¿qué elemento técnico actuaría como los 'boxes' o el lugar donde el vehículo (energía) entrega su carga antes de volver?",
          options: ["El Conductor de cobre.", "El Interruptor o guardián.", "El Receptor o lamparita.", "La Fuente de energía o pila."],
          correct: "c",
          explanation: "Correcta (c): El receptor es definido como el componente que 'entrega su energía a un receptor' durante el trayecto."
        },
        { text: "Si se desea diseñar un sistema de seguridad donde el corte de cualquier sensor desactive toda la maquinaria, ¿qué topología de red sería la más eficiente bajo la lógica del Material?",
          options: ["Topología en Paralelo, para asegurar que cada sensor tenga su propio carril.", "Topología en Serie, para que cualquier interrupción individual apague todo el sistema.", "Un Circuito Conmutado, para poder reactivarlo desde cualquier punto.", "Un sistema de 'Fontanería' con retorno hidráulico."],
          correct: "b",
          explanation: "Correcta (b): El circuito en serie tiene la característica de que si un componente falla, todo el sistema se apaga, ideal para una cadena de seguridad."
        },
        { text: "¿Cuál es la función técnica del 'Conductor' dentro de la 'Matemática Visual del Diseño' (Material)?",
          options: ["Proveer el empuje inicial de la corriente.", "Actuar como el guardián que abre o cierra el camino.", "Servir como la ruta que lleva la corriente de un lugar a otro en un bucle cerrado.", "Transformar la energía eléctrica en una tarea mecánica."],
          correct: "c",
          explanation: "Correcta (c): El conductor se define como 'la ruta' que transporta la corriente entre el generador y el receptor."
        },
        { text: "Analizando la 'Bisagra de una Puerta' (Material), ¿por qué se considera un transformador de fuerza?",
          options: ["Porque multiplica la fuerza del empuje inicial mediante engranajes internos.", "Porque convierte un empuje lineal (fuerza física recta) en un movimiento circular.", "Porque permite que las paredes se vuelvan móviles sin necesidad de energía eléctrica.", "Porque utiliza el principio de la hélice para reducir la fricción del peso de la puerta."],
          correct: "b",
          explanation: "Correcta (b): La fuente especifica que la bisagra 'convierte el empuje lineal en movimiento circular seguro'."
        },
        { text: "En el diagnóstico de un circuito, se observa que el interruptor está cerrado y la pila tiene carga, pero el receptor no funciona. Según el 'Lenguaje del Flujo' (Material), ¿qué parte del sistema de retorno debería inspeccionarse?",
          options: ["La capacidad del receptor para aprovechar la energía.", "La continuidad del cable (la manguera) para asegurar que el circuito sea 'cerrado'.", "El nivel de torsión aplicado originalmente al generador.", "La resistencia mecánica del molinete hidráulico."],
          correct: "b",
          explanation: "Correcta (b): Para que la corriente fluya, el camino debe ser 'estrictamente un camino cerrado'; una ruptura en el retorno detiene el flujo."
        },
        { text: "El término 'Dominar las reglas del tráfico invisible' (Material) se refiere a la transición de la palanca al electrón. ¿Qué diferencia clave destaca el autor entre ambos sistemas?",
          options: ["Los sistemas mecánicos son visibles y los eléctricos son puramente matemáticos.", "Los mecánicos canalizan la energía del cuerpo humano; los eléctricos, fuerzas invisibles.", "La mecánica no requiere circuitos cerrados, mientras que la electricidad sí.", "El flujo de electrones es más lento que la torsión de engranajes mecánicos."],
          correct: "b",
          explanation: "Correcta (b): El texto dice: 'Mientras que los sistemas mecánicos canalizan la energía del cuerpo humano, los sistemas eléctricos canalizan fuerzas invisibles'."
        },
        { text: "Al observar el diagrama del 'Circuito Simple' (Material), ¿qué representa la línea larga y corta en el símbolo del generador?",
          options: ["La entrada y salida de agua de la bomba.", "Los polos positivo (+) y negativo (-) de la pila o batería.", "El estado de abierto o cerrado del interruptor de seguridad.", "La resistencia interna y la capacidad total de carga."],
          correct: "b",
          explanation: "Correcta (b): El símbolo de la pila/batería se compone de una línea larga y una corta para indicar la polaridad."
        },
        { text: "¿Qué problema arquitectónico específico resuelve el 'Circuito Conmutado' (Material [10 y 11])?",
          options: ["El alto costo de instalar múltiples receptores en un pasillo largo.", "La imposibilidad de apagar una luz si los interruptores normales se ponen en paralelo.", "El desafío de controlar una misma carga desde dos ubicaciones distintas sin que ambos tengan que estar encendidos.", "La pérdida de voltaje que ocurre cuando los conductores son demasiado largos."],
          correct: "c",
          explanation: "Correcta (c): El desafío es controlar 'una misma luz desde dos lugares distintos' sin la limitación de los interruptores en serie."
        },
        { text: "En el mecanismo del sacacorchos (Material), el 'Worm Gear Drive' interactúa con las palancas. Si los dientes del engranaje estuvieran desgastados, ¿cuál sería el síntoma técnico?",
          options: ["Las palancas subirían solas sin aplicar torque al gusano.", "El torque de entrada no se transmitiría eficazmente al movimiento de rotación de la hélice.", "El ratio de multiplicación de fuerza aumentaría espontáneamente a 8:1.", "La corriente eléctrica no regresaría a la fuente de forma instantánea."],
          correct: "b",
          explanation: "Correcta (b): El worm gear drive es responsable de la transmisión y transformación del torque entre las palancas y el eje rotacional."
        },
        { text: "Según la visión general de 'La Ingeniería de lo Cotidiano', ¿cuál es el objetivo primordial al 'decodificar' estos sistemas?",
          options: ["Aprender a reparar electrodomésticos sin ayuda profesional.", "Entender las fuerzas invisibles y los sistemas de energía que mueven nuestro mundo.", "Memorizar los símbolos técnicos para dibujo industrial.", "Sustituir todos los mecanismos mecánicos por sistemas electrónicos."],
          correct: "b",
          explanation: "Correcta (b): La portada define el propósito como 'decodificando las fuerzas invisibles y los sistemas de energía que mueven nuestro mundo'."
        }
    ];

    let userAnswers = new Array(20).fill(null);
    let currentIndex = 0;

    const questionContainer = document.getElementById('questionContainer');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const resetBtn = document.getElementById('resetBtn');
    const finalScoreBtn = document.getElementById('finalScoreBtn');
    const questionCounterSpan = document.getElementById('questionCounter');
    const liveScoreSpan = document.getElementById('liveScore');
    const resultsPanel = document.getElementById('resultsPanel');

    function updateLiveScore() {
        let correctCount = 0;
        for (let i = 0; i < userAnswers.length; i++) {
            if (userAnswers[i] && userAnswers[i] === questionsData[i].correct) correctCount++;
        }
        liveScoreSpan.textContent = `✅ Aciertos: ${correctCount} / 20`;
        return correctCount;
    }

    function saveAnswer(selectedLetter) {
        userAnswers[currentIndex] = selectedLetter;
        updateLiveScore();
        renderCurrentQuestion();
    }

    function renderCurrentQuestion() {
        const q = questionsData[currentIndex];
        const selected = userAnswers[currentIndex];
        const letters = ['a', 'b', 'c', 'd'];
        let optionsHtml = '';
        q.options.forEach((opt, idx) => {
            const letter = letters[idx];
            const isChecked = (selected === letter);
            optionsHtml += `
                <div class="option" data-letter="${letter}">
                    <input type="radio" name="question" value="${letter}" id="opt_${letter}" ${isChecked ? 'checked' : ''}>
                    <label for="opt_${letter}"><strong>${letter.toUpperCase()})</strong> ${opt}</label>
                </div>
            `;
        });

        let feedbackHtml = '';
        if (selected) {
            const isCorrect = (selected === q.correct);
            const correctLetter = q.correct;
            const correctText = q.options[letters.indexOf(correctLetter)];
            const explanation = q.explanation;
            if (isCorrect) {
                feedbackHtml = `<div class="feedback correct">✅ <strong>¡Correcto!</strong> ${explanation}</div>`;
            } else {
                feedbackHtml = `<div class="feedback incorrect">❌ <strong>Incorrecto.</strong> La respuesta correcta es ${correctLetter.toUpperCase()}) ${correctText}.<br>${explanation}</div>`;
            }
        } else {
            feedbackHtml = `<div class="feedback" style="border-left-color:#ffcc88; background:#fff5e6;">⚡ Selecciona una opción para ver la retroalimentación.</div>`;
        }

        const html = `
            <div class="question-card">
                <div class="question-text">${q.text}</div>
                <div class="options" id="optionsContainer">
                    ${optionsHtml}
                </div>
                ${feedbackHtml}
            </div>
        `;
        questionContainer.innerHTML = html;

        // Event listeners
        const optionDivs = document.querySelectorAll('.option');
        optionDivs.forEach(div => {
            const radio = div.querySelector('input[type="radio"]');
            const letter = div.getAttribute('data-letter');
            if (radio) {
                radio.addEventListener('change', () => {
                    if (radio.checked) saveAnswer(letter);
                });
            }
            div.addEventListener('click', (e) => {
                if (e.target.tagName !== 'INPUT') {
                    const radioInside = div.querySelector('input');
                    if (radioInside && !radioInside.checked) {
                        radioInside.checked = true;
                        saveAnswer(letter);
                    }
                }
            });
        });

        questionCounterSpan.textContent = `Pregunta ${currentIndex+1} / 20`;
    }

    function showFinalResults() {
        let correctCount = 0;
        let detailsHtml = '';
        for (let i = 0; i < questionsData.length; i++) {
            const q = questionsData[i];
            const userAns = userAnswers[i];
            const isCorrect = (userAns === q.correct);
            if (isCorrect) correctCount++;
            const statusIcon = isCorrect ? '✅' : '❌';
            const userShow = userAns ? userAns.toUpperCase() : '—';
            const correctShow = q.correct.toUpperCase();
            detailsHtml += `
                <div class="result-item">
                    <span style="min-width: 30px;">${statusIcon}</span>
                    <span><strong>Pregunta ${i+1}</strong> (Tu respuesta: ${userShow} / Correcta: ${correctShow})</span>
                </div>
            `;
        }
        const percent = Math.round((correctCount / 20) * 100);
        resultsPanel.innerHTML = `
            <h3>📊 Resultado final</h3>
            <div class="result-summary">🎯 Aciertos: ${correctCount} de 20 (${percent}%)</div>
            <div class="result-detail">${detailsHtml}</div>
            <button id="closeResultsBtn" class="btn btn-secondary" style="margin-top: 10px; width:100%;">✖ Cerrar resumen</button>
        `;
        resultsPanel.style.display = 'block';
        document.getElementById('closeResultsBtn')?.addEventListener('click', () => {
            resultsPanel.style.display = 'none';
        });
        alert(`📊 Cuestionario completado.\nAciertos: ${correctCount} de 20 (${percent}%)\nRevisa el resumen detallado en pantalla.`);
    }

    function nextQuestion() {
        if (currentIndex < 19) {
            currentIndex++;
            renderCurrentQuestion();
        } else {
            const unanswered = userAnswers.filter(a => a === null).length;
            if (unanswered > 0) {
                if (confirm(`Aún tienes ${unanswered} pregunta(s) sin responder. ¿Deseas finalizar de todas formas? Las no respondidas se contarán como incorrectas.`)) {
                    showFinalResults();
                }
            } else {
                showFinalResults();
            }
        }
    }

    function prevQuestion() {
        if (currentIndex > 0) {
            currentIndex--;
            renderCurrentQuestion();
        } else {
            alert("Ya estás en la primera pregunta.");
        }
    }

    function resetQuiz() {
        if (confirm("¿Reiniciar todo el cuestionario? Se perderán todas las respuestas.")) {
            userAnswers = new Array(20).fill(null);
            currentIndex = 0;
            resultsPanel.style.display = 'none';
            updateLiveScore();
            renderCurrentQuestion();
        }
    }

    prevBtn.addEventListener('click', prevQuestion);
    nextBtn.addEventListener('click', nextQuestion);
    resetBtn.addEventListener('click', resetQuiz);
    finalScoreBtn.addEventListener('click', showFinalResults);

    renderCurrentQuestion();
    updateLiveScore();
</script>
</body>
</html>
